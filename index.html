<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--surface3:#30363d;
  --border:#30363d;--border2:#484f58;
  --blue:#58a6ff;--blue-dim:rgba(88,166,255,0.12);
  --green:#3fb950;--green-dim:rgba(63,185,80,0.12);
  --purple:#bc8cff;--purple-dim:rgba(188,140,255,0.12);
  --amber:#d29922;--amber-dim:rgba(210,153,34,0.12);
  --red:#f85149;
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* ── TOP BAR ── */
.bar{
  height:52px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  position:sticky;top:0;z-index:100;
}
.bar-brand{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--blue);display:flex;align-items:center;gap:8px}
.bar-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.bar-info{font-family:var(--mono);font-size:11px;color:var(--text3)}

/* ── PAGE ── */
.page{display:flex;flex-direction:column;gap:0;max-width:1400px;margin:0 auto;padding:20px;gap:16px}

/* ── SETUP CARD ── */
.setup{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:12px}
.setup-row{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
.setup-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}

/* FILE DROP */
.file-btn{
  display:flex;align-items:center;gap:8px;padding:8px 14px;
  background:var(--surface2);border:1px dashed var(--border2);border-radius:8px;
  cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;white-space:nowrap;
}
.file-btn:hover{border-color:var(--blue);color:var(--blue)}
.file-btn.loaded{border-color:var(--green);border-style:solid;color:var(--green)}
.file-btn input{display:none}

/* PROVIDER PILLS */
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{
  padding:6px 14px;border-radius:20px;border:1px solid var(--border2);
  font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);
  background:transparent;transition:all .15s;white-space:nowrap;
}
.pill:hover{border-color:var(--blue);color:var(--blue)}
.pill.on{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}
.pill.kw.on{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}

/* API KEY */
.key-wrap{display:flex;gap:6px;align-items:center}
.key-wrap input{
  padding:7px 12px;background:var(--surface2);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);font-family:var(--mono);font-size:12px;
  outline:none;transition:border-color .15s;width:260px;
}
.key-wrap input:focus{border-color:var(--blue)}
.key-wrap input::placeholder{color:var(--text3)}
.btn-sm{
  padding:7px 14px;border-radius:8px;border:1px solid var(--border2);
  background:transparent;color:var(--text2);font-size:12px;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.btn-sm:hover{border-color:var(--blue);color:var(--blue)}
.btn-sm.saved{border-color:var(--green);color:var(--green)}
.free-badge{font-size:11px;color:var(--green);white-space:nowrap}

/* ── SEARCH AREA ── */
.search-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px}
.search-top{display:flex;gap:10px;align-items:flex-start}
textarea#query{
  flex:1;padding:12px 14px;background:var(--surface2);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);font-family:var(--sans);font-size:14px;
  line-height:1.6;resize:vertical;min-height:90px;outline:none;transition:border-color .15s;
}
textarea#query:focus{border-color:var(--blue)}
textarea#query::placeholder{color:var(--text3)}
.btn-search{
  padding:12px 24px;background:var(--blue);color:#fff;border:none;border-radius:8px;
  font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;
  white-space:nowrap;align-self:flex-end;min-width:140px;
}
.btn-search:hover{background:#79b8ff}
.btn-search:disabled{opacity:.4;cursor:not-allowed}
.btn-search.ai{background:linear-gradient(135deg,#6e40c9,#bc8cff)}
.btn-search.ai:hover{background:linear-gradient(135deg,#8459da,#d0a6ff)}

/* FILTERS */
.filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:11px;color:var(--text3);margin-right:2px}
.fchip{
  padding:3px 10px;border-radius:20px;border:1px solid var(--border);
  font-size:11px;cursor:pointer;color:var(--text3);background:transparent;transition:all .15s;
}
.fchip:hover{border-color:var(--border2);color:var(--text2)}
.fchip.on{background:var(--blue-dim);border-color:var(--blue);color:var(--blue)}

/* ── RESULTS ── */
.results-grid{display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start}
.results-list{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.results-header{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2);display:flex;justify-content:space-between;align-items:center}
.results-header strong{color:var(--text);font-weight:600}

.ritem{
  padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;
  transition:background .12s;display:flex;flex-direction:column;gap:4px;
}
.ritem:last-child{border-bottom:none}
.ritem:hover{background:var(--surface2)}
.ritem.sel{background:var(--blue-dim);border-left:3px solid var(--blue)}
.ritem-top{display:flex;align-items:center;gap:8px}
.rank{
  width:22px;height:22px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;font-family:var(--mono);
}
.r1{background:rgba(210,153,34,.2);color:var(--amber)}
.r2{background:rgba(139,148,158,.15);color:#8b949e}
.r3{background:rgba(180,120,60,.2);color:#c98a50}
.rn{background:var(--surface3);color:var(--text3)}
.rbar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.rbar-fill{height:100%;border-radius:2px;background:var(--blue);transition:width .3s}
.rbar-fill.ai{background:var(--purple)}
.rpct{font-family:var(--mono);font-size:10px;color:var(--text3);width:32px;text-align:right}
.rcod{font-family:var(--mono);font-size:10px;color:var(--text3)}
.rtitle{font-size:12px;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ritem.sel .rtitle{color:var(--text)}
.rtags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--surface3);color:var(--text3);font-family:var(--mono)}
.tag-ai{background:var(--purple-dim);color:var(--purple)}
.tag-cat{background:var(--blue-dim);color:var(--blue)}
.tag-nav{background:var(--green-dim);color:var(--green)}
.ai-why{font-size:11px;color:var(--purple);font-style:italic;line-height:1.3;margin-top:2px}

/* ── DETAIL PANEL ── */
.detail{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:14px}
.empty-detail{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:10px;color:var(--text3);text-align:center}
.empty-num{font-family:var(--mono);font-size:56px;font-weight:700;color:var(--surface3);line-height:1}

.dtop{display:flex;gap:12px;align-items:flex-start;justify-content:space-between}
.dtitle{font-size:15px;font-weight:600;color:var(--text);line-height:1.4;flex:1}
.dcod{font-family:var(--mono);font-size:11px;color:var(--blue);background:var(--blue-dim);padding:4px 10px;border-radius:6px;flex-shrink:0;white-space:nowrap}
.dtags2{display:flex;gap:6px;flex-wrap:wrap}

.ai-box{background:var(--purple-dim);border:1px solid rgba(188,140,255,.2);border-radius:8px;padding:12px 14px}
.ai-box-lbl{font-size:10px;font-weight:600;color:var(--purple);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.ai-box-txt{font-size:13px;color:var(--text2);line-height:1.6}

.nav-path{display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:10px 14px;background:var(--green-dim);border:1px solid rgba(63,185,80,.2);border-radius:8px;font-family:var(--mono);font-size:12px;color:var(--green)}
.nav-sep{color:rgba(63,185,80,.3)}

.block{background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.block-head{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border);background:var(--surface2)}
.block-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.block-body{padding:14px;font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-word}
.btn-copy{padding:4px 12px;border:1px solid var(--border2);background:transparent;color:var(--text2);border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s;font-family:var(--mono)}
.btn-copy:hover{border-color:var(--blue);color:var(--blue)}
.btn-copy.ok{border-color:var(--green);color:var(--green)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.iblock{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px}
.iblock-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.iblock-val{font-size:13px;color:var(--text2);line-height:1.5}

mark{background:rgba(210,153,34,.2);color:var(--amber);border-radius:2px;padding:0 2px}

/* SPINNER */
.spin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:14px}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-txt{font-size:12px;color:var(--text3);text-align:center}
.spin-step{font-size:11px;color:var(--purple);margin-top:4px}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--green-dim);border:1px solid var(--green);color:var(--green);padding:8px 16px;border-radius:8px;font-size:12px;z-index:999;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* RESPONSIVE */
@media(max-width:900px){
  .page{padding:12px;gap:12px}
  .results-grid{grid-template-columns:1fr;gap:12px}
  .setup-row{flex-direction:column;gap:8px}
  .key-wrap input{width:100%}
  .search-top{flex-direction:column}
  .btn-search{width:100%;text-align:center}
  .grid2{grid-template-columns:1fr}
  .dtop{flex-direction:column;gap:8px}
  .bar-info{display:none}
}

*{scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="bar">
  <div class="bar-brand">
    <div class="bar-dot"></div>
    CRM // ASSISTENTE IA
  </div>
  <div class="bar-info" id="bar-info">Carregue o arquivo de logs para começar</div>
</div>

<div class="page">

  <!-- SETUP -->
  <div class="setup">

    <!-- Row 1: arquivo + modo + provedor -->
    <div class="setup-row" style="align-items:center;gap:16px">

      <!-- Arquivo -->
      <div>
        <div class="setup-label">Arquivo de Logs</div>
        <label class="file-btn" id="file-btn">
          <input type="file" id="finput" accept=".txt,.csv" onchange="loadFile(this.files[0])">
          <span id="file-icon">📂</span>
          <span id="file-txt">Carregar NotebookLM_V1.txt</span>
        </label>
      </div>

      <!-- Modo -->
      <div>
        <div class="setup-label">Modo de Busca</div>
        <div class="pills">
          <button class="pill kw" id="m-kw" onclick="setMode('kw')">⚡ Palavras-chave</button>
          <button class="pill on" id="m-ai" onclick="setMode('ai')">✦ IA (inteligente)</button>
        </div>
      </div>

      <!-- Provedor (só no modo IA) -->
      <div id="prov-wrap">
        <div class="setup-label">Provedor</div>
        <div class="pills">
          <button class="pill" id="p-claude" onclick="setProv('claude')">Claude</button>
          <button class="pill" id="p-openai" onclick="setProv('openai')">ChatGPT</button>
          <button class="pill" id="p-gemini" onclick="setProv('gemini')">Gemini</button>
          <button class="pill on" id="p-groq" onclick="setProv('groq')">⚡ Groq <span class="free-badge">grátis</span></button>
        </div>
      </div>

    </div>

    <!-- Row 2: API key (só modo IA) -->
    <div id="key-row">
      <div class="setup-label" id="key-label">Chave API Groq</div>
      <div class="key-wrap">
        <input type="password" id="apikey" placeholder="gsk_...">
        <button class="btn-sm" id="btn-save" onclick="saveKey()">Salvar</button>
        <span id="key-hint" class="free-badge">Grátis em console.groq.com → API Keys</span>
      </div>
    </div>

  </div>

  <!-- SEARCH -->
  <div class="search-card">
    <div class="search-top">
      <textarea id="query" placeholder="Cole aqui o título ou descrição do chamado...&#10;&#10;Ex: usuário não consegue inserir Netfone, erro elemento de rede informado difere do configurado"></textarea>
      <button class="btn-search ai" id="btn-search" onclick="buscar()">✦ Buscar com IA</button>
    </div>
    <div class="filters">
      <span class="filter-label">Categoria:</span>
      <div id="fchips">
        <button class="fchip on" onclick="setFilter('todos',this)">Todos</button>
      </div>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results-grid" id="results-section" style="display:none">

    <!-- List -->
    <div class="results-list">
      <div class="results-header">
        <strong id="res-count">0</strong> <span style="margin-left:4px">logs encontrados</span>
        <span id="res-mode-badge" style="font-size:10px;color:var(--purple)"></span>
      </div>
      <div id="rlist"></div>
    </div>

    <!-- Detail -->
    <div class="detail" id="detail">
      <div class="empty-detail">
        <div class="empty-num">←</div>
        <p>Selecione um log para ver a resolução completa</p>
      </div>
    </div>

  </div>

</div>

<script>
// ── STATE ─────────────────────────────────────────────────────────
let logs=[], filter='todos', mode='ai', prov='groq';
let results=[], selIdx=null;

const PROVIDERS = {
  claude:  {label:'Chave API Anthropic', ph:'sk-ant-...', hint:'console.anthropic.com → API Keys', free:false},
  openai:  {label:'Chave API OpenAI',    ph:'sk-...',     hint:'platform.openai.com → API Keys',  free:false},
  gemini:  {label:'Chave API Gemini',    ph:'AIza...',    hint:'aistudio.google.com → Get API Key', free:true},
  groq:    {label:'Chave API Groq',      ph:'gsk_...',    hint:'console.groq.com → API Keys',     free:true},
};

// ── INIT ──────────────────────────────────────────────────────────
window.onload = () => {
  ['claude','openai','gemini','groq'].forEach(p => {
    const k=localStorage.getItem('crm_key_'+p);
    if(k && p===prov) document.getElementById('apikey').value=k;
  });
  setProv('groq');
  setMode('ai');
};

// ── FILE ──────────────────────────────────────────────────────────
document.getElementById('file-btn').ondragover = e=>e.preventDefault();
document.getElementById('file-btn').ondrop = e=>{e.preventDefault();loadFile(e.dataTransfer.files[0]);};

function loadFile(f){
  if(!f) return;
  const r=new FileReader();
  r.onload=e=>{
    parseLogs(e.target.result);
    const btn=document.getElementById('file-btn');
    btn.classList.add('loaded');
    document.getElementById('file-icon').textContent='✓';
    document.getElementById('file-txt').textContent=`${logs.length.toLocaleString('pt-BR')} logs — ${f.name}`;
    document.getElementById('bar-info').textContent=`${logs.length.toLocaleString('pt-BR')} logs carregados`;
    buildFilters();
  };
  r.readAsText(f,'latin1');
}

function parseLogs(text){
  logs=[];
  const lines=text.split('\n');
  for(let i=1;i<lines.length;i++){
    const r=lines[i].trim(); if(!r) continue;
    const p=splitSV(r); if(p.length<6) continue;
    const cl=s=>{s=(s||'').trim().replace(/^"|"$/g,'');return['0','N/A','N|A','N/C',''].includes(s)?'':s;};
    const l={c:cl(p[0]),t:cl(p[1]),o:cl(p[2]),prob:cl(p[5]||''),s:cl(p[6]||''),a:cl(p[7]||''),f:cl(p[12]||'')};
    if(l.c&&l.t) logs.push(l);
  }
}

function splitSV(line){
  const r=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===';'&&!inQ){r.push(cur);cur='';}
    else cur+=ch;
  }
  r.push(cur);return r;
}

function getCat(t){
  t=(t||'').toLowerCase();
  if(t.includes('netsales')) return 'Netsales';
  if(t.includes('suspensao temporaria')) return 'Suspensão Temp.';
  if(t.includes('mudanca de pacote')) return 'Mudança de Pacote';
  if(t.includes('cancelamento')) return 'Cancelamento';
  if(t.includes('transferencia de titularidade')) return 'Titularidade';
  if(t.includes('migracao')) return 'Migração';
  if(t.includes('perfil')&&(t.includes('acesso')||t.includes('usuario'))) return 'Perfil/Acesso';
  if(t.startsWith('job')||t.includes('abort')) return 'JOB';
  if(t.includes('fepp')) return 'FEPP';
  if(t.includes('nmc')) return 'NMC';
  if(t.includes('netfone')) return 'Netfone';
  if(t.includes('claro crm')) return 'Claro CRM';
  if(t.startsWith('crm')) return 'CRM';
  if(t.includes('netsms')) return 'NETSMS';
  if(t.includes('vsales')) return 'Vsales';
  if(t.includes('atlas')) return 'Atlas';
  if(t.includes('falha de processo')) return 'Falha Processo';
  return 'Outros';
}

function buildFilters(){
  const cats=[...new Set(logs.map(l=>getCat(l.t)))].sort();
  const row=document.getElementById('fchips');
  row.innerHTML='<button class="fchip on" onclick="setFilter(\'todos\',this)">Todos</button>';
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='fchip';b.textContent=c;b.onclick=()=>setFilter(c,b);row.appendChild(b);
  });
}

function setFilter(cat,el){
  filter=cat;
  document.querySelectorAll('.fchip').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}

// ── MODE + PROVIDER ───────────────────────────────────────────────
function setMode(m){
  mode=m;
  document.getElementById('m-kw').className='pill kw'+(m==='kw'?' on':'');
  document.getElementById('m-ai').className='pill'+(m==='ai'?' on':'');
  document.getElementById('prov-wrap').style.display=m==='ai'?'':'none';
  document.getElementById('key-row').style.display=m==='ai'?'':'none';
  const btn=document.getElementById('btn-search');
  btn.textContent=m==='ai'?'✦ Buscar com IA':'⚡ Buscar';
  btn.className='btn-search'+(m==='ai'?' ai':'');
}

function setProv(p){
  prov=p;
  ['claude','openai','gemini','groq'].forEach(x=>{
    document.getElementById('p-'+x).className='pill'+(p===x?' on':'');
  });
  const cfg=PROVIDERS[p];
  document.getElementById('key-label').textContent=cfg.label;
  document.getElementById('apikey').placeholder=cfg.ph;
  document.getElementById('key-hint').textContent=cfg.free?'✓ Grátis — '+cfg.hint:cfg.hint;
  document.getElementById('key-hint').style.color=cfg.free?'var(--green)':'var(--text3)';
  const saved=localStorage.getItem('crm_key_'+p);
  document.getElementById('apikey').value=saved||'';
}

function saveKey(){
  const k=document.getElementById('apikey').value.trim();
  if(!k) return;
  localStorage.setItem('crm_key_'+prov,k);
  const btn=document.getElementById('btn-save');
  btn.textContent='✓ Salvo'; btn.classList.add('saved');
  setTimeout(()=>{btn.textContent='Salvar';btn.classList.remove('saved');},2000);
}

// ── KEYWORD SCORING ───────────────────────────────────────────────
function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ');}
function tok(s){
  const sw=new Set(['ao','um','uma','que','nao','por','de','da','do','em','no','na','os','as','se','foi','para','com','mas','e','a','o','ou','sua','seu','ha','este','essa','esta','pelo','pela','esse']);
  return norm(s).split(/\s+/).filter(t=>t.length>2&&!sw.has(t));
}
function kwScore(log,qt){
  const fields=[{ts:tok(log.t),w:4},{ts:tok(log.prob),w:3},{ts:tok(log.o),w:2},{ts:tok(log.s),w:1.5},{ts:tok(log.a),w:1}];
  let sc=0,seen=new Set();
  for(const q of qt){
    for(const f of fields){
      const hit=f.ts.some(t=>t===q||(t.length>3&&t.includes(q))||(q.length>4&&q.includes(t)));
      const key=q+'|'+f.w;
      if(hit&&!seen.has(key)){sc+=f.w;seen.add(key);}
    }
  }
  const nt=norm(log.t);
  for(let i=0;i<qt.length-1;i++) if(nt.includes(qt[i]+' '+qt[i+1])) sc+=3;
  return sc;
}

// ── MAIN SEARCH ───────────────────────────────────────────────────
async function buscar(){
  if(!logs.length){alert('Carregue o arquivo de logs primeiro!');return;}
  const query=document.getElementById('query').value.trim();
  if(!query) return;

  const btn=document.getElementById('btn-search');
  btn.disabled=true; btn.textContent='Buscando...';

  try{
    if(mode==='ai') await buscarIA(query);
    else buscarKW(query);
  }catch(e){
    showErr(e.message);
  }

  btn.disabled=false;
  btn.textContent=mode==='ai'?'✦ Buscar com IA':'⚡ Buscar';
}

// ── KW SEARCH ─────────────────────────────────────────────────────
function buscarKW(query){
  const qt=tok(query);
  const pool=filter==='todos'?logs:logs.filter(l=>getCat(l.t)===filter);
  const scored=pool.map(l=>({log:l,sc:kwScore(l,qt),reason:'',ai:false}))
    .filter(x=>x.sc>0).sort((a,b)=>b.sc-a.sc).slice(0,15);
  const max=scored[0]?.sc||1;
  results=scored.map((x,i)=>({...x,pct:Math.round(x.sc/max*100),rank:i+1}));
  renderResults(qt,'Palavras-chave');
}

// ── AI SEARCH ─────────────────────────────────────────────────────
async function buscarIA(query){
  const apiKey=document.getElementById('apikey').value.trim()||localStorage.getItem('crm_key_'+prov);
  if(!apiKey){alert('Cole sua chave de API e clique Salvar');return;}

  // Loading
  document.getElementById('results-section').style.display='grid';
  document.getElementById('rlist').innerHTML='';
  document.getElementById('detail').innerHTML=`
    <div class="spin-wrap">
      <div class="spinner"></div>
      <div class="spin-txt">Analisando com IA...<div class="spin-step" id="sstep">Filtrando candidatos</div></div>
    </div>`;

  // Pre-filter
  const qt=tok(query);
  const pool=filter==='todos'?logs:logs.filter(l=>getCat(l.t)===filter);
  let cands;
  if(qt.length>0){
    const sc=pool.map(l=>({log:l,sc:kwScore(l,qt)})).filter(x=>x.sc>0).sort((a,b)=>b.sc-a.sc).slice(0,35);
    cands=sc.length>=5?sc:pool.slice(0,35).map(l=>({log:l,sc:0}));
  } else {
    cands=pool.slice(0,35).map(l=>({log:l,sc:0}));
  }

  const logList=cands.slice(0,15).map((x,i)=>`[${i}] ${x.log.t.substring(0,90)}`).join('\n');

  try{document.getElementById('sstep').textContent='Enviando para '+prov+'...';}catch(e){}

  const sys=`Especialista CRM telecom. Responda APENAS JSON válido, sem markdown.`;
  const usr=`CHAMADO: ${query}\n\nLOGS:\n${logList}\n\nRanqueie os mais relevantes. JSON:\n{"analise":"frase","ranking":[{"idx":0,"relevancia":95,"motivo":"razão"}]}\nMáx 8 logs, relevância >30.`;

  let raw='';
  if(prov==='claude'){
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,system:sys,messages:[{role:'user',content:usr}]})});
    if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'Erro Claude '+r.status);}
    const d=await r.json(); raw=d.content[0].text;
  } else if(prov==='gemini'){
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:sys+'\n\n'+usr}]}],generationConfig:{maxOutputTokens:800,temperature:.1}})});
    if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'Erro Gemini '+r.status);}
    const d=await r.json(); raw=d.candidates?.[0]?.content?.parts?.[0]?.text||'';
  } else if(prov==='groq'){
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:800,temperature:.1,messages:[{role:'system',content:sys},{role:'user',content:usr}]})});
    if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'Erro Groq '+r.status);}
    const d=await r.json(); raw=d.choices[0].message.content;
  } else {
    const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},body:JSON.stringify({model:'gpt-4o-mini',max_tokens:800,messages:[{role:'system',content:sys},{role:'user',content:usr}],response_format:{type:'json_object'}})});
    if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'Erro OpenAI '+r.status);}
    const d=await r.json(); raw=d.choices[0].message.content;
  }

  const ai=JSON.parse(raw.replace(/```json|```/g,'').trim());
  const ranking=ai.ranking||[];
  results=ranking.filter(r=>r.idx>=0&&r.idx<cands.length).map((r,i)=>({
    log:cands[r.idx].log, sc:r.relevancia, pct:r.relevancia,
    rank:i+1, reason:r.motivo||'', ai:true, analise:ai.analise||''
  }));

  renderResults(qt, 'IA — '+prov, ai.analise);
}

// ── RENDER ────────────────────────────────────────────────────────
function renderResults(qt, badge, analise){
  document.getElementById('results-section').style.display='grid';
  document.getElementById('res-count').textContent=results.length;
  document.getElementById('res-mode-badge').textContent=badge||'';

  let html='';
  if(analise){
    html+=`<div style="padding:10px 14px;border-bottom:1px solid var(--border);font-size:11px;color:var(--purple);font-style:italic;">✦ ${esc(analise)}</div>`;
  }
  results.forEach((r,i)=>{
    const cat=getCat(r.log.t);
    const rc=r.rank===1?'r1':r.rank===2?'r2':r.rank===3?'r3':'rn';
    const nav=r.log.s?r.log.s.split(/[-–>→]/)[0].trim():'';
    html+=`<div class="ritem" id="ri-${i}" onclick="selItem(${i})">
      <div class="ritem-top">
        <div class="rank ${rc}">${r.rank}</div>
        <div class="rbar"><div class="rbar-fill${r.ai?' ai':''}" style="width:${r.pct}%"></div></div>
        <div class="rpct">${r.pct}%</div>
      </div>
      <div class="rcod">#${r.log.c}</div>
      <div class="rtitle">${hlText(r.log.t,qt)}</div>
      ${r.reason?`<div class="ai-why">✦ ${esc(r.reason)}</div>`:''}
      <div class="rtags">
        <span class="tag tag-cat">${cat}</span>
        ${r.ai?'<span class="tag tag-ai">IA</span>':''}
        ${nav?`<span class="tag tag-nav">${esc(nav)}</span>`:''}
      </div>
    </div>`;
  });
  if(!results.length) html='<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px;">Nenhum log encontrado</div>';
  document.getElementById('rlist').innerHTML=html;
  document.getElementById('detail').innerHTML=`<div class="empty-detail"><div class="empty-num">←</div><p>Selecione um log</p></div>`;
  selIdx=null;
}

function selItem(i){
  document.querySelectorAll('.ritem').forEach(el=>el.classList.remove('sel'));
  document.getElementById(`ri-${i}`).classList.add('sel');
  selIdx=i;
  const r=results[i];
  showDetail(r);
  // scroll detail into view on mobile
  if(window.innerWidth<=900) document.getElementById('detail').scrollIntoView({behavior:'smooth'});
}

function showDetail(r){
  const {log,pct,rank,reason,ai}=r;
  const cat=getCat(log.t);
  const navPath=(log.s||'').replace(/\s*[-–>→]+\s*/g,' → ').trim();
  const navParts=navPath?navPath.split('→').map(s=>s.trim()).filter(Boolean):[];
  let h='';

  h+=`<div class="dtop"><div class="dtitle">${esc(log.t)}</div><div class="dcod">#${log.c}</div></div>`;
  h+=`<div class="dtags2">
    <span class="tag tag-cat">${cat}</span>
    <span class="tag" style="background:var(--amber-dim);color:var(--amber)">Rank #${rank}</span>
    <span class="tag" style="background:${ai?'var(--purple-dim)':'var(--blue-dim)'};color:${ai?'var(--purple)':'var(--blue)'};">${pct}% match</span>
    ${ai?'<span class="tag tag-ai">✦ IA</span>':''}
  </div>`;

  if(reason) h+=`<div class="ai-box"><div class="ai-box-lbl">✦ Por que este log foi selecionado</div><div class="ai-box-txt">${esc(reason)}</div></div>`;

  if(navParts.length>0){
    h+=`<div class="nav-path">`;
    navParts.forEach((p,i)=>{h+=`<span>${esc(p)}</span>`;if(i<navParts.length-1)h+=`<span class="nav-sep"> → </span>`;});
    h+=`</div>`;
  }

  if(log.o) h+=`<div class="block"><div class="block-head"><span class="block-lbl">Resposta / Observação — copiar e colar no chamado</span><button class="btn-copy" onclick="cp('obs',this)">Copiar</button></div><div class="block-body" id="obs">${esc(log.o)}</div></div>`;

  if(log.prob||log.a){
    h+=`<div class="grid2">`;
    if(log.prob) h+=`<div class="iblock"><div class="iblock-lbl">Causa raiz</div><div class="iblock-val">${esc(log.prob)}</div></div>`;
    if(log.a) h+=`<div class="iblock"><div class="iblock-lbl">Paliativo / Ação</div><div class="iblock-val">${esc(log.a)}</div></div>`;
    h+=`</div>`;
  }

  if(log.f) h+=`<div class="iblock"><div class="iblock-lbl">Ação FCA</div><div class="iblock-val">${esc(log.f)}</div></div>`;

  if(navPath&&navParts.length>1) h+=`<div class="block"><div class="block-head"><span class="block-lbl">Caminho no sistema</span><button class="btn-copy" onclick="cp('nav',this)">Copiar</button></div><div class="block-body" id="nav">${esc(navPath)}</div></div>`;

  document.getElementById('detail').innerHTML=h;
}

function showErr(msg){
  document.getElementById('results-section').style.display='grid';
  document.getElementById('rlist').innerHTML='';
  document.getElementById('detail').innerHTML=`<div class="empty-detail"><div style="color:var(--red);font-size:14px;font-weight:600;">Erro na IA</div><p style="font-size:12px;max-width:340px;">${esc(msg)}</p><p style="font-size:11px;color:var(--text3);margin-top:8px;">Verifique sua chave API ou use o modo ⚡ Palavras-chave</p></div>`;
}

// ── HELPERS ───────────────────────────────────────────────────────
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hlText(txt,toks){
  if(!toks?.length) return esc(txt);
  let r=esc(txt);
  const e=toks.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  return r.replace(new RegExp(`(${e.join('|')})`,'gi'),'<mark>$1</mark>');
}
function cp(id,btn){
  const el=document.getElementById(id); if(!el) return;
  navigator.clipboard.writeText(el.innerText).then(()=>{
    const p=btn.textContent; btn.textContent='✓ Copiado!'; btn.classList.add('ok');
    setTimeout(()=>{btn.textContent=p;btn.classList.remove('ok');},2000);
  });
}

// Ctrl+Enter to search
document.getElementById('query').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.preventDefault();buscar();}
});
</script>
